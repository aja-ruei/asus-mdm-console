<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>裝置群組 — ASUS MDM Console</title>
  </head>
  <body data-page="devices" data-nav="device-groups">
    <div class="app">
      <div data-component="sidebar"></div>
      <div data-component="header" data-breadcrumb="Home / Device management / 裝置群組"></div>
      <main class="page page-device-groups">
        <section class="surface">
          <header class="page-head">
            <h1 class="page-head__title">裝置群組</h1>
            <div class="page-head__actions">
              <button class="btn btn--ghost" type="button">
                <img class="btn__icon" src="/assets/icon_refresh.svg" alt="" />重新整理
              </button>
              <button class="btn btn--ghost" type="button">
                <img class="btn__icon" src="/assets/icon_deployment.svg" alt="" />連接 Intune 群組
              </button>
              <button class="btn btn--primary" type="button">新增裝置群組</button>
            </div>
          </header>

          <div class="toolbar">
            <button class="btn btn--ghost toolbar__delete" type="button" disabled>
              <img class="btn__icon" src="/assets/icon_delete.svg" alt="" />刪除
            </button>
            <div class="toolbar__right">
              <button class="toolbar__filter" type="button" aria-label="篩選">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
                </svg>
              </button>
              <div class="search">
                <img class="search__icon" src="/assets/icon_search.svg" alt="" />
                <input class="search__input" type="search" placeholder="Search..." aria-label="搜尋裝置群組" />
              </div>
            </div>
          </div>

          <div class="table-scroll">
            <table class="data-table data-table--selectable">
              <thead>
                <tr>
                  <th class="data-table__check">
                    <input type="checkbox" data-select-all aria-label="全選" />
                  </th>
                  <th>群組名稱</th>
                  <th>裝置數量</th>
                  <th>建立日期</th>
                  <th>修改日期</th>
                </tr>
              </thead>
              <tbody data-list="device-groups"></tbody>
            </table>
          </div>

          <footer class="pagination" data-pagination></footer>
        </section>
      </main>
    </div>
    <script type="module" src="/src/js/pages/device-groups.js"></script>
  </body>
</html>
